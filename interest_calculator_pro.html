<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>利息收益计算器 Pro</title>
  <style>
    :root{--primary:#4f46e5;--bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--soft:#f9fafb;--danger:#ef4444;--shadow:0 18px 40px rgba(17,24,39,.08)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top left,rgba(79,70,229,.14),transparent 34%),linear-gradient(180deg,#f8fafc 0%,var(--bg) 100%);color:var(--text);padding:18px;display:flex;justify-content:center;align-items:center}
    body.dark{--bg:#0f172a;--card:#111827;--text:#f9fafb;--muted:#9ca3af;--border:#374151;--soft:#1f2937;--shadow:0 18px 40px rgba(0,0,0,.35);background:radial-gradient(circle at top left,rgba(99,102,241,.22),transparent 34%),linear-gradient(180deg,#020617 0%,#0f172a 100%)}
    .app{width:100%;max-width:480px;background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:22px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}h1{font-size:24px;line-height:1.25;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:6px}.icon-btn{border:1px solid var(--border);background:var(--soft);color:var(--text);border-radius:999px;padding:9px 12px;cursor:pointer;font-size:14px;white-space:nowrap}.grid{display:grid;gap:15px}.field label{display:flex;justify-content:space-between;margin-bottom:7px;font-weight:650;font-size:14px}.hint{color:var(--muted);font-weight:400;font-size:12px}.input-wrap{position:relative}input[type=number]{width:100%;border:1px solid var(--border);background:var(--soft);color:var(--text);border-radius:12px;padding:13px 46px 13px 13px;font-size:17px;outline:none}input[type=number]:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(79,70,229,.12)}.unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}.tag{border:1px solid var(--border);background:var(--soft);color:var(--text);border-radius:999px;padding:7px 11px;font-size:12px;cursor:pointer}.tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}.seg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.seg input{display:none}.seg span{display:block;text-align:center;border:1px solid var(--border);background:var(--soft);border-radius:12px;padding:11px 8px;cursor:pointer;font-size:13px;color:var(--text)}.seg input:checked+span{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}.error{display:none;margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(239,68,68,.1);color:var(--danger);font-size:13px}.results{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:var(--soft);border:1px solid var(--border);border-radius:16px;padding:14px}.card.main{grid-column:1/-1;border-left:5px solid var(--primary)}.label{color:var(--muted);font-size:12px;margin-bottom:6px}.value{font-size:18px;font-weight:800;word-break:break-all}.main .value{color:var(--primary);font-size:30px}.formula{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.6;background:var(--soft);border:1px dashed var(--border);border-radius:14px;padding:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.action{border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}.copy{background:var(--primary);color:#fff}.reset{background:var(--soft);color:var(--text);border:1px solid var(--border)}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;display:none}.disclaimer{margin:16px 0 0;color:var(--muted);text-align:center;font-size:12px;line-height:1.7}@media(max-width:390px){body{padding:10px;align-items:flex-start}.app{padding:18px;border-radius:18px}.results{grid-template-columns:1fr}.main .value{font-size:26px}}
  </style>
</head>
<body>
  <main class="app">
    <div class="top"><div><h1>💰 利息收益计算器 Pro</h1><div class="sub">支持单利、复利、快捷利率、日收益与结果复制</div></div><button class="icon-btn" id="themeBtn" type="button">🌙 深色</button></div>
    <section class="grid">
      <div class="field"><label>存款本金 <span class="hint">Principal</span></label><div class="input-wrap"><input type="number" id="principal" value="100000" min="0" step="100"><span class="unit">元</span></div></div>
      <div class="field"><label>预期年化利率 <span class="hint">Annual rate</span></label><div class="input-wrap"><input type="number" id="rate" value="3.0" min="0" step="0.01"><span class="unit">%</span></div><div class="tags" id="rateTags"><button class="tag" data-rate="1.5">1.5%</button><button class="tag" data-rate="2">2%</button><button class="tag" data-rate="2.5">2.5%</button><button class="tag active" data-rate="3">3%</button><button class="tag" data-rate="3.5">3.5%</button><button class="tag" data-rate="4">4%</button></div></div>
      <div class="field"><label>存放时间 <span class="hint">Days</span></label><div class="input-wrap"><input type="number" id="days" value="45" min="1" step="1"><span class="unit">天</span></div><div class="tags" id="dayTags"><button class="tag" data-days="7">7天</button><button class="tag" data-days="30">30天</button><button class="tag active" data-days="45">45天</button><button class="tag" data-days="90">90天</button><button class="tag" data-days="180">180天</button><button class="tag" data-days="365">365天</button></div></div>
      <div class="field"><label>计算方式</label><div class="seg"><label><input type="radio" name="mode" value="simple" checked><span>单利</span></label><label><input type="radio" name="mode" value="compound"><span>按日复利</span></label></div></div>
      <div class="field"><label>一年天数基准</label><div class="seg"><label><input type="radio" name="yearDays" value="365" checked><span>365天 常规</span></label><label><input type="radio" name="yearDays" value="360"><span>360天 部分银行</span></label></div></div>
      <div class="error" id="errorBox"></div>
    </section>
    <section class="results"><div class="card main"><div class="label">预计可得利息</div><div class="value" id="interestResult">￥0.00</div></div><div class="card"><div class="label">到期本息</div><div class="value" id="totalResult">￥0.00</div></div><div class="card"><div class="label">平均日收益</div><div class="value" id="dailyResult">￥0.00</div></div><div class="card"><div class="label">月均收益</div><div class="value" id="monthlyResult">￥0.00</div></div><div class="card"><div class="label">年化收益</div><div class="value" id="yearlyResult">￥0.00</div></div></section>
    <div class="formula" id="formulaDetails"></div>
    <div class="actions"><button class="action copy" id="copyBtn" type="button">复制结果</button><button class="action reset" id="resetBtn" type="button">一键重置</button></div>
    <p class="disclaimer">免责声明：本工具计算结果仅供参考，实际收益以银行、平台或具体产品规则为准，不构成任何投资建议。</p>
  </main>
  <div class="toast" id="toast">已复制计算结果</div>
  <script>
    const principalInput=document.getElementById('principal'),rateInput=document.getElementById('rate'),daysInput=document.getElementById('days'),errorBox=document.getElementById('errorBox');
    const interestResult=document.getElementById('interestResult'),totalResult=document.getElementById('totalResult'),dailyResult=document.getElementById('dailyResult'),monthlyResult=document.getElementById('monthlyResult'),yearlyResult=document.getElementById('yearlyResult'),formulaDetails=document.getElementById('formulaDetails');
    function money(v){return '￥'+Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
    function checked(n){return document.querySelector(`input[name="${n}"]:checked`).value}
    function clearActive(id){document.querySelectorAll(`#${id} .tag`).forEach(b=>b.classList.remove('active'))}
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1600)}
    function calculate(){const p=parseFloat(principalInput.value),rate=parseFloat(rateInput.value),r=rate/100,d=parseInt(daysInput.value,10),y=parseInt(checked('yearDays'),10),mode=checked('mode');
      if(isNaN(p)||isNaN(rate)||isNaN(d)){errorBox.style.display='block';errorBox.textContent='请完整填写本金、利率和存放天数。';return}
      if(p<=0){errorBox.style.display='block';errorBox.textContent='存款本金必须大于 0。';return} if(rate<0){errorBox.style.display='block';errorBox.textContent='年化利率不能小于 0。';return} if(d<=0){errorBox.style.display='block';errorBox.textContent='存放天数必须大于 0。';return} errorBox.style.display='none';
      let total,interest;if(mode==='compound'){total=p*Math.pow(1+r/y,d);interest=total-p}else{interest=p*r*(d/y);total=p+interest}
      const daily=interest/d,monthly=daily*30,yearly=daily*y;interestResult.textContent=money(interest);totalResult.textContent=money(total);dailyResult.textContent=money(daily);monthlyResult.textContent=money(monthly);yearlyResult.textContent=money(yearly);
      const modeText=mode==='compound'?'按日复利':'单利',formula=mode==='compound'?`到期本息 = 本金 × (1 + 年化利率 / ${y}) ^ 天数`:`利息 = 本金 × 年化利率 × (天数 / ${y})`;
      formulaDetails.innerHTML=`<strong>${modeText}</strong><br>计算公式：${formula}<br>${p.toLocaleString('zh-CN')} × ${rate.toFixed(2)}% × ${d}天，预计利息为 <strong>${money(interest)}</strong>，到期本息为 <strong>${money(total)}</strong>。`}
    document.querySelectorAll('input').forEach(i=>{i.addEventListener('input',calculate);i.addEventListener('change',calculate)});
    document.querySelectorAll('#dayTags .tag').forEach(b=>b.addEventListener('click',()=>{daysInput.value=b.dataset.days;clearActive('dayTags');b.classList.add('active');calculate()}));
    document.querySelectorAll('#rateTags .tag').forEach(b=>b.addEventListener('click',()=>{rateInput.value=b.dataset.rate;clearActive('rateTags');b.classList.add('active');calculate()}));
    document.getElementById('resetBtn').addEventListener('click',()=>{principalInput.value='100000';rateInput.value='3.0';daysInput.value='45';document.querySelector('input[name="mode"][value="simple"]').checked=true;document.querySelector('input[name="yearDays"][value="365"]').checked=true;clearActive('dayTags');document.querySelector('#dayTags .tag[data-days="45"]').classList.add('active');clearActive('rateTags');document.querySelector('#rateTags .tag[data-rate="3"]').classList.add('active');calculate()});
    document.getElementById('copyBtn').addEventListener('click',async()=>{const text=['利息收益计算结果',`本金：${money(parseFloat(principalInput.value))}`,`年化利率：${parseFloat(rateInput.value).toFixed(2)}%`,`存放天数：${parseInt(daysInput.value,10)}天`,`计算方式：${checked('mode')==='compound'?'按日复利':'单利'}`,`预计利息：${interestResult.textContent}`,`到期本息：${totalResult.textContent}`,`平均日收益：${dailyResult.textContent}`,'结果仅供参考，不构成投资建议。'].join('\n');try{await navigator.clipboard.writeText(text);showToast('已复制计算结果')}catch(e){showToast('复制失败，请手动复制')}});
    document.getElementById('themeBtn').addEventListener('click',()=>{document.body.classList.toggle('dark');document.getElementById('themeBtn').textContent=document.body.classList.contains('dark')?'☀️ 浅色':'🌙 深色'});
    calculate();
  </script>
</body>
</html>
